# .github/workflows/deploy.yml
# GitHub Actions automated backend-only deployment pipeline matching Constitution Principle VIII.
# Automatically applies Terraform infrastructure to deploy the serverless AWS API backend.

name: Serverless Backend Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Provision Backend API
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository code
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2. Set up Python 3.12 environment
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      # 3. Set up HashiCorp Terraform CLI
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: "1.0.2"
          terraform_wrapper: false

      # 4. Configure AWS Credentials from GitHub Repository Secrets
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-2 # Home AWS region

      # 5. Bootstrap the S3 Remote State Bucket if it does not exist yet (Principle III / VIII)
      - name: Bootstrap S3 Remote State Bucket
        run: |
          if ! aws s3api head-bucket --bucket open-emfer-v2-production-tfstate-harvy 2>/dev/null; then
            echo "S3 state bucket does not exist. Bootstrapping..."
            aws s3api create-bucket \
              --bucket open-emfer-v2-production-tfstate-harvy \
              --region eu-west-2 \
              --create-bucket-configuration LocationConstraint=eu-west-2
          else
            echo "S3 state bucket already exists."
          fi

      # 6. Initialize and Apply Terraform Configurations
      - name: Terraform Init & Apply
        run: |
          cd tf/
          terraform init
          terraform apply -var="aws_profile=" -auto-approve

      # 7. Run Integration Tests (Constitution Principle VI / VIII)
      - name: Run Integration Tests
        run: |
          python3 backend/test_endpoints.py

      # 8. Fetch CloudWatch Logs on Failure
      - name: Fetch CloudWatch Logs on Failure
        if: failure()
        run: |
          echo "Integration tests failed. Retrieving latest CloudWatch Log events..."
          LOG_STREAMS=$(aws logs describe-log-streams --log-group-name "/aws/lambda/open_emfer_v2_production_api" --order-by "LastEventTime" --descending --limit 1 --query "logStreams[0].logStreamName" --output text 2>/dev/null || echo "")
          if [ -n "$LOG_STREAMS" ] && [ "$LOG_STREAMS" != "None" ]; then
            aws logs get-log-events --log-group-name "/aws/lambda/open_emfer_v2_production_api" --log-stream-name "$LOG_STREAMS" --limit 50 --query "events[*].message" --output text
          else
            echo "No active log streams found for /aws/lambda/open_emfer_v2_production_api."
          fi
