    #reverse {
      display: none;
    }

    /* Create a custom checkbox */
    .custom-checkbox {
      display: inline-block;
      width: 20px;
      height: 20px;
      background: white;
      border: 2px solid #000;
      cursor: pointer;
    }

    /* Style the custom checkbox when the actual checkbox is checked */
    #reverse:checked + .custom-checkbox {
      background: #000;
    }

    /* hide element */

      display: none !important;

    .footer-card {

      bottom: 0;
      left: 0;

    #response {

      right: 0;

    }

    #response.success {
      background-color: green;
      color: white;

    #response.error {

      color: white;
    }

<section style="margin-bottom: 6rem; text-align: center">

  <form id="resetForm">

    <input
        class="button is-danger"
        type="submit"
        name="type"
        value="ResetDay"
    />
  </form>

<div class="footer-card">
  <label style="margin-right: 1rem">
    <input type="checkbox" id="reverse" name="reverse" value="true"/>
    <span class="custom-checkbox"></span>
  </label>
  <button class="button" id="toggleReverse">Toggle Reverse</button>
</div>
<div id="response"></div>
<script>
  document
  .getElementById("toggleReverse")
  .addEventListener("click", function (e) {
    e.preventDefault();

    var reverseCheckbox = document.getElementById("reverse");
    reverseCheckbox.checked = !reverseCheckbox.checked;
  });

  document.querySelectorAll("form").forEach((form) => {
    form.addEventListener("submit", function (e) {
      e.preventDefault();

      if (e.submitter.value === "ResetDay") {
        var confirmation = confirm("Are you sure you want to reset?");
        if (!confirmation) {
          return; // If the user clicked "Cancel", stop here
        }
      }

      // Clear the response
      document.getElementById("response").textContent = "";

      var certainValues = ["Lager", "IPA", "Cider"];
      var beerBoolean = "";

      if (certainValues.includes(e.submitter.value)) {
        // If it is, set the value of the hidden field
        beerBoolean = "true";
      }
      console.log(certainValues.includes(e.submitter.value));

      var reverse = document.getElementById("reverse").checked;

      const data = {
        event: form.querySelector('input[type="hidden"]').value,
        type: e.submitter.value,
        beer: beerBoolean,
        reverse: reverse,
      };

      fetch("https://emf.harvinderatwal.com/beer", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          TRACKER_KEY: "yaesh2miRu4aokoa1jo9vah4zoo5ree8",
        },
        body: JSON.stringify(data),
      })
      .then((response) => response.json())
      .then((data) => {
        console.log(data);
        document.getElementById("response").textContent = "Success";
        document.getElementById("response").classList.add("success");
        document.getElementById("response").classList.remove("error");
      })
      .catch((error) => {
        console.log(data);
        console.error("Error:", error);
        document.getElementById("response").textContent =
            JSON.stringify(error);
        document.getElementById("response").classList.add("error");
        document.getElementById("response").classList.remove("success");
      });
    });
  });

  function toogleMood() {
    var elements = document.getElementsByClassName("moodExpandedList");
    for (var i = 0; i < elements.length; i++) {
      elements[i].classList.toggle("hidden");
    }

    var textElements = document.getElementsByClassName("moodExpandedTest");
    for (var i = 0; i < textElements.length; i++) {
      textElements[i].classList.toggle("hidden");
    }
  }
</script>
